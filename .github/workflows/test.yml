name: Test

on:
  push:
    tags-ignore: ['v*']   # release.yml already tests on version tags
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: node --test
